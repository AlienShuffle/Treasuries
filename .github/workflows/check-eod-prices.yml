name: Check EOD Prices

# Runs every 15 min during 5-8pm ET window (Mon-Fri) to detect when
# FedInvest publishes end-of-day prices on the historical endpoint.
# Check logs to find the exact publish time, then this workflow can be deleted.

on:
  schedule:
    - cron: '*/15 21-23 * * 1-5'  # 5:00-7:45pm EDT (UTC-4)
    - cron: '*/15 0 * * 2-6'      # 8:00-8:45pm EDT / covers EST overlap
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check EOD prices
        run: node fetchFedInvestHistoricalPrices.js
